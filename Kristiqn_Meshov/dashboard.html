<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <nav class="navbar">
        <div class="logo">Focus<span>Flow</span></div>
    </nav>
</header>

<main class="dashboard-container">

    <section class="card">
        <h2>Бързи задачи</h2>

        <div class="task-input-group">
            <input type="text" id="task-input">

            <button onclick="addTask()" class="btn btn-primary">
                Добави
            </button>
        </div>

        <ul id="task-list"></ul>
    </section>

    <section class="card">
        <h2>Pomodoro</h2>

        <div class="timer-display">
            25:00
        </div>
    </section>
</main>
<script src="addtask.js"></script>
</body>
</html>
