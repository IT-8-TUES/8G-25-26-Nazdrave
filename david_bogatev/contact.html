<nav>
  <div class="logo">Focus<span>Flow</span></div>
  <ul class="nav-links">
    <li><a href="index.html">Начало</a></li>

  <button class="theme-btn" onclick="toggleTheme()">
    <span id="theme-icon">☀️</span> 
    <span id="theme-label">Светла</span>
  </button>
</nav>

<main>
  <div class="page-header">
    <h1>Контакти</h1>
    <p class="subtitle">Имаш въпрос, идея или забележка? Пиши ни!</p>
  </div>

  <div class="card">
    <form id="contact-form">
      <div style="margin-bottom: 15px;">
        <label>Твоето име</label><br>
        <input type="text" id="name" style="width: 100%; padding: 10px; margin-top: 5px;" required>
      </div>
      
      <div style="margin-bottom: 15px;">
        <label>Имейл адрес</label><br>
        <input type="email" id="email" style="width: 100%; padding: 10px; margin-top: 5px;" required>
      </div>
      
      <div style="margin-bottom: 15px;">
        <label>Съобщение</label><br>
        <textarea id="message" rows="6" style="width: 100%; padding: 10px; margin-top: 5px;" required></textarea>
      </div>
      
      <button type="submit" class="btn-add" style="width: 100%; padding: 12px;">Изпрати съобщение</button>
    </form>
  </div>

  <div class="card">
    <h2>Други начини за връзка</h2>
    <p><strong>GitHub:</strong> <a href="https://github.com/IT-8-TUES/8G-25-26-Nazdrave" target="_blank">8G-25-26-Nazdrave</a></p>
  </div>
</main>

<footer>
  © 2026 FocusFlow · 8Г, ТУЕС · Всички права запазени
</footer>

<script src="js/light_dark_mode.js"></script>
<script>
  document.getElementById('contact-form').addEventListener('submit', function(e) {
    e.preventDefault();
    alert('✅ Съобщението е изпратено успешно! (Демо версия)');
    this.reset();
  });
</script>
</body>
</html>
